<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Under Construction</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: #f9f9f9;
            color: #333;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 700px;
            width: 100%;
            text-align: center;
            padding: 50px 40px;
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.05);
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, #4a90e2, #63d3ff, #4a90e2);
            background-size: 200% 100%;
            animation: gradientMove 3s ease infinite;
        }

        .logo {
            margin-bottom: 30px;
            font-weight: 700;
            font-size: 2rem;
            letter-spacing: -0.5px;
            color: #2c3e50;
        }

        .logo span {
            color: #4a90e2;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 300;
            margin-bottom: 15px;
            color: #2c3e50;
        }

        .highlight {
            font-weight: 600;
            color: #4a90e2;
        }

        p {
            font-size: 1.1rem;
            color: #666;
            margin-bottom: 30px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        .construction-icon {
            font-size: 4rem;
            color: #4a90e2;
            margin: 30px 0;
            display: inline-block;
            animation: float 3s ease-in-out infinite;
        }

        .progress-container {
            width: 100%;
            height: 6px;
            background-color: #eaeaea;
            border-radius: 3px;
            margin: 40px 0 50px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 65%;
            background: linear-gradient(90deg, #4a90e2, #63d3ff);
            border-radius: 3px;
            animation: progressAnimation 2s ease-in-out infinite alternate;
        }

        .contact-info {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid #eee;
        }

        .contact-info p {
            margin-bottom: 10px;
            font-size: 1rem;
        }

        .email {
            color: #4a90e2;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
            font-size: 1.1rem;
        }

        .email:hover {
            color: #2c3e50;
            text-decoration: underline;
        }

        .footer {
            margin-top: 40px;
            color: #999;
            font-size: 0.9rem;
        }

        /* Animations */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes progressAnimation {
            0% { width: 65%; }
            100% { width: 70%; }
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .container {
                padding: 40px 25px;
            }

            h1 {
                font-size: 2rem;
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 1.7rem;
            }

            p {
                font-size: 1rem;
            }

            .construction-icon {
                font-size: 3rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo"><span></span></div>

        <div class="construction-icon">
            <i class="fas fa-tools"></i>
        </div>

        <h1>We're <span class="highlight">Under Construction</span></h1>

        <p>Our website is currently undergoing a major update. We're working hard to create a better experience for you and will be back online soon.</p>

        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>


        <div class="footer">
            &copy; 2026. All rights reserved.
        </div>
    </div>

    <script>
        // Add subtle hover effect to the container
        document.querySelector('.container').addEventListener('mouseenter', function() {
            this.style.transform = 'translateY(-5px)';
            this.style.transition = 'transform 0.3s ease';
        });

        document.querySelector('.container').addEventListener('mouseleave', function() {
            this.style.transform = 'translateY(0)';
        });
    </script>
</body>
</html>
